<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Applicant Matching Tool — Minerva University</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Applicant Matcher</h1>
            <p class="subtitle">Find your path at Minerva based on your background and goals.</p>
        </div>
    </header>

    <main class="container">
        <!-- M1: Applicant Survey Section -->
        <section id="survey-section" class="card">
            <h2>Your Academic Journey</h2>
            <form id="survey-form">
                <div class="form-group">
                    <label for="academicBackground">What is your primary academic background?</label>
                    <select id="academicBackground" name="academicBackground" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="natural-sciences">Natural Sciences</option>
                        <option value="social-sciences">Social Sciences</option>
                        <option value="arts-humanities">Arts & Humanities</option>
                        <option value="computational-sciences">Computational Sciences</option>
                        <option value="business">Business / Entrepreneurship</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="interests">What interdisciplinary topics fascinate you most?</label>
                    <textarea id="interests" name="interests" placeholder="e.g. Ethics in AI, Sustainable Urban Development, Neuroplasticity..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="careerGoals">What are your long-term career goals?</label>
                    <textarea id="careerGoals" name="careerGoals" placeholder="Describe the impact you want to have on the world..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="globalChallenges">Which global challenge do you want to solve first?</label>
                    <input type="text" id="globalChallenges" name="globalChallenges" placeholder="e.g. Climate Change, Educational Equity..." required>
                </div>

                <button type="submit" class="btn-primary">Find My Match</button>
            </form>
        </section>

        <!-- M2/M3: Results Section -->
        <section id="results-section" class="hidden">
            <div id="loading-state">
                <p id="loading-message" class="loading-spinner">Loading your matches...</p>
            </div>
            <div id="recommendations-grid">
                <!-- Discovery Cards will be injected here -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="copyright">
                &copy; 2026 Minerva University Student Project
            </div>
            <!-- MANDATORY AI DISCLOSURE (per Minerva Guardrails) -->
            <div class="ai-disclosure">
                <span class="badge">AI-Assisted</span>
                Developed with Gemini CLI & Minerva AI Framework
            </div>
        </div>
    </footer>

    <script src="js/curriculum.js"></script>
    <script src="js/matching.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
